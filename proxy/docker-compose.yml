version: '3.8'

services:
  huinet-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: huinet-proxy:latest
    container_name: huinet-proxy
    ports:
      - "3000:3000"  # HTTP API
      - "3001:3001"  # WebSocket
      - "8000:8000"  # HuiNet P2P
    environment:
      - HUINET_API_KEY=${HUINET_API_KEY:-hk_default_change_me_in_production}
      - HUINET_PORT=8000
      - HUINET_ENABLE_MDNS=true
      - HUINET_LOG_LEVEL=info
      - HUINET_MAX_CONNECTIONS=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health", "--timeout=10", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - huinet-network

  # Optional: Run a simple client to test the proxy
  # huinet-client:
  #   image: node:18-alpine
  #   container_name: huinet-client
  #   working_dir: /app
  #   volumes:
  #     - ./examples/agent-integration/http-client-example.js:/app/client.js:ro
  #   environment:
  #     - HUINET_API_KEY=${HUINET_API_KEY}
  #   command: ["sh", "-c", "apk add --no-cache wget && sleep 5 && node /app/client.js"]
  #   depends_on:
  #     - huinet-proxy
  #   networks:
  #     - huinet-network

networks:
  huinet-network:
    driver: bridge
